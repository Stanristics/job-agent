services:
  # ── Backend API ─────────────────────────────
  - type: web
    name: job-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false   # you will paste this manually in Render dashboard
      - key: PORT
        value: 8000
    healthCheckPath: /stats

  # ── Scheduler (background worker) ───────────
  - type: worker
    name: job-agent-scheduler
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: GROQ_API_KEY
        sync: false

services:
  # ── Backend API + Frontend Dashboard ────────
  - type: web
    name: job-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8000
    healthCheckPath: /stats

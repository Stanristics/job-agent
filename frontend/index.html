<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Agent — Stanley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f111a;--surface:#161b2e;--surface2:#1e2540;--surface3:#252d4a;
      --border:#2a3356;--blue:#4f8ef7;--green:#3ecf8e;--red:#f56565;
      --yellow:#f6c90e;--purple:#a78bfa;--text:#e2e8f0;--muted:#64748b;
      --radius:12px;
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    button{cursor:pointer;border:none;font-family:inherit}
    input,select,textarea{font-family:inherit;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--blue)}
    textarea{resize:vertical;min-height:120px}

    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
    .sidebar-logo{font-size:16px;font-weight:700;color:var(--blue);padding:8px 12px 20px;display:flex;align-items:center;gap:8px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;background:none;border:none;width:100%;text-align:left}
    .nav-item:hover{background:var(--surface2);color:var(--text)}
    .nav-item.active{background:var(--blue)22;color:var(--blue)}
    .nav-item i{width:16px;text-align:center}
    .main{flex:1;overflow:auto;padding:28px}

    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .page-title{font-size:20px;font-weight:600}
    .page-subtitle{font-size:13px;color:var(--muted);margin-top:2px}

    .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
    .stat-value{font-size:28px;font-weight:700;line-height:1}
    .stat-label{font-size:12px;color:var(--muted);margin-top:4px}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s}
    .btn-primary{background:var(--blue);color:#fff}
    .btn-primary:hover{filter:brightness(1.1)}
    .btn-success{background:var(--green);color:#0a2018}
    .btn-success:hover{filter:brightness(1.1)}
    .btn-danger{background:var(--red);color:#fff}
    .btn-danger:hover{filter:brightness(1.1)}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
    .btn-purple{background:var(--purple);color:#1a0a2e}
    .btn-purple:hover{filter:brightness(1.1)}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .filter-btn{padding:6px 14px;border-radius:999px;font-size:12px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .15s}
    .filter-btn.active,.filter-btn:hover{background:var(--blue)22;color:var(--blue);border-color:var(--blue)55}
    .search-input{max-width:240px;padding:7px 12px;font-size:13px}

    .jobs-grid{display:flex;flex-direction:column;gap:10px}
    .job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;transition:border-color .15s;cursor:pointer}
    .job-card:hover{border-color:var(--blue)55}
    .job-card.selected{border-color:var(--blue)}
    .score-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
    .score-high{background:#3ecf8e22;color:var(--green);border:2px solid var(--green)55}
    .score-mid{background:#f6c90e22;color:var(--yellow);border:2px solid var(--yellow)55}
    .score-low{background:#f5656522;color:var(--red);border:2px solid var(--red)55}
    .job-title{font-size:14px;font-weight:600;margin-bottom:3px}
    .job-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .job-meta span{display:flex;align-items:center;gap:4px}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500}
    .badge-pending{background:#4f8ef722;color:var(--blue)}
    .badge-approved{background:#3ecf8e22;color:var(--green)}
    .badge-rejected{background:#f5656522;color:var(--red)}
    .badge-submitted{background:#a78bfa22;color:var(--purple)}
    .badge-source{background:var(--surface2);color:var(--muted)}
    .job-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}

    .detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px}
    .detail-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:20px}
    .detail-title{font-size:18px;font-weight:700;margin-bottom:4px}
    .detail-company{font-size:14px;color:var(--muted)}
    .detail-section{margin-bottom:20px}
    .detail-section h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
    .highlights{display:flex;flex-direction:column;gap:6px}
    .highlight-item{display:flex;align-items:start;gap:8px;font-size:13px}
    .highlight-item i{color:var(--green);margin-top:2px;flex-shrink:0}
    .concern-item i{color:var(--yellow)}
    .action-bar{display:flex;gap:10px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}

    /* Email modal */
    .modal-overlay{position:fixed;inset:0;background:#00000088;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:480px}
    .modal h3{font-size:16px;font-weight:600;margin-bottom:6px}
    .modal p{font-size:13px;color:var(--muted);margin-bottom:20px}
    .modal-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
    .modal-fields label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end}

    /* SMTP warning */
    .smtp-warning{background:#f6c90e11;border:1px solid var(--yellow)44;border-radius:8px;padding:12px 16px;font-size:12px;color:var(--yellow);margin-bottom:16px;line-height:1.6}

    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:var(--muted);font-weight:500}
    .settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .settings-card h3{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}

    .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;animation:slideUp .2s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .toast.success{border-color:var(--green);color:var(--green)}
    .toast.error{border-color:var(--red);color:var(--red)}

    .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state i{font-size:40px;margin-bottom:12px;display:block}

    @media(max-width:768px){
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .settings-grid{grid-template-columns:1fr}
      .sidebar{display:none}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API = window.location.origin;

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}><i className={`fa ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}`}/>{msg}</div>;
}

function ApplicationTypeBadge({ url }) {
  const u = (url || '').toLowerCase();
  let type = 'email', icon = 'fa-envelope', color = 'var(--purple)';
  if (u.includes('linkedin.com'))      { type = 'LinkedIn (may redirect)'; icon = 'fa-window-restore'; color = 'var(--blue)'; }
  else if (u.includes('greenhouse.io')){ type = 'Greenhouse Form'; icon = 'fa-window-restore'; color = 'var(--blue)'; }
  else if (u.includes('workday') )     { type = 'Workday Form'; icon = 'fa-window-restore'; color = 'var(--blue)'; }
  else if (u.includes('lever.co'))     { type = 'Lever Form'; icon = 'fa-window-restore'; color = 'var(--blue)'; }
  else if (u.includes('indeed.com'))   { type = 'Indeed (manual)'; icon = 'fa-hand-pointer'; color = 'var(--yellow)'; }
  else                                  { type = 'Email apply'; icon = 'fa-envelope'; color = 'var(--purple)'; }

  return <span className="badge" style={{background:`${color}22`,color}}><i className={`fa ${icon}`}/> {type}</span>;
}

function ScoreCircle({ score }) {
  const cls = score >= 75 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low';
  return <div className={`score-circle ${cls}`}>{score}</div>;
}

function StatusBadge({ status }) {
  const map = { pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected', submitted:'badge-submitted' };
  return <span className={`badge ${map[status]||'badge-pending'}`}>{status}</span>;
}

// ── Email Modal ────────────────────────────────────────────────────────────────
function EmailModal({ job, onClose, onSent, toast }) {
  const [toEmail, setToEmail]   = useState('');
  const [sending, setSending]   = useState(false);
  const [smtpReady, setSmtpReady] = useState(false);

  useEffect(() => {
    fetch(`${API}/settings`).then(r=>r.json()).then(s => {
      setSmtpReady(!!(s.smtp_user && s.smtp_pass));
    }).catch(()=>{});
  }, []);

  const send = async () => {
    if (!toEmail) { toast('Please enter the company email address', 'error'); return; }
    setSending(true);
    try {
      const r = await fetch(`${API}/jobs/${job.id}/send-email`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ to_email: toEmail, job_id: job.id })
      });
      const d = await r.json();
      if (d.success) {
        toast(`Email sent successfully to ${toEmail}!`, 'success');
        onSent();
        onClose();
      } else {
        toast(`Failed: ${d.error}`, 'error');
      }
    } catch(e) {
      toast('Something went wrong sending the email', 'error');
    }
    setSending(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3><i className="fa fa-paper-plane" style={{color:'var(--blue)',marginRight:8}}/>Send Application Email</h3>
        <p>This will send your cover letter and CV to the company's email address.</p>

        {!smtpReady && (
          <div className="smtp-warning">
            <i className="fa fa-exclamation-triangle"/> Your Gmail SMTP is not configured yet.
            Go to <b>Settings → Email Setup</b> to add your Gmail and app password first.
          </div>
        )}

        <div className="modal-fields">
          <div>
            <label>Company email address</label>
            <input
              type="email"
              placeholder="e.g. careers@company.com"
              value={toEmail}
              onChange={e=>setToEmail(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&send()}
            />
          </div>
          <div style={{background:'var(--surface2)',borderRadius:8,padding:12,fontSize:12,color:'var(--muted)'}}>
            <div style={{marginBottom:4}}><b style={{color:'var(--text)'}}>Job:</b> {job.title} at {job.company}</div>
            <div><b style={{color:'var(--text)'}}>Attaching:</b> Cover letter (body) + CV (attachment)</div>
          </div>
        </div>

        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={send} disabled={sending || !smtpReady}>
            {sending ? <><i className="fa fa-spinner fa-spin"/>Sending...</> : <><i className="fa fa-paper-plane"/>Send Email</>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Job Detail Panel ───────────────────────────────────────────────────────────
function JobDetail({ job, onUpdate, onClose, toast }) {
  const [letter, setLetter]       = useState(job.cover_letter || '');
  const [saving, setSaving]       = useState(false);
  const [showEmail, setShowEmail] = useState(false);
  const reason = typeof job.match_reason === 'object' ? job.match_reason : {};

  const update = async (status) => {
    setSaving(true);
    await fetch(`${API}/jobs/${job.id}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status, cover_letter: letter })
    });
    setSaving(false);
    onUpdate();
    toast(`Application ${status}!`, 'success');
  };

  const saveLetter = async () => {
    setSaving(true);
    await fetch(`${API}/jobs/${job.id}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ cover_letter: letter })
    });
    setSaving(false);
    toast('Cover letter saved!', 'success');
  };

  return (
    <div className="detail-panel">
      {showEmail && (
        <EmailModal job={{...job, cover_letter: letter}} onClose={()=>setShowEmail(false)}
          onSent={onUpdate} toast={toast}/>
      )}

      <div className="detail-header">
        <div>
          <div className="detail-title">{job.title}</div>
          <div className="detail-company">{job.company} · {job.location}</div>
          <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
            <StatusBadge status={job.status}/>
            <span className="badge badge-source"><i className="fa fa-link"/>{job.source}</span>
            <ApplicationTypeBadge url={job.url}/>
            {job.salary && <span className="badge" style={{background:'#a78bfa22',color:'var(--purple)'}}>{job.salary}</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <a href={job.url} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">
            <i className="fa fa-external-link-alt"/>View Job
          </a>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><i className="fa fa-times"/></button>
        </div>
      </div>

      {reason.reason && (
        <div className="detail-section">
          <h4>AI Match Analysis</h4>
          <p style={{fontSize:13,color:'var(--muted)',marginBottom:12,lineHeight:1.6}}>{reason.reason}</p>
          <div className="highlights">
            {(reason.highlights||[]).map((h,i)=>(
              <div key={i} className="highlight-item"><i className="fa fa-check-circle"/>  {h}</div>
            ))}
            {(reason.concerns||[]).map((c,i)=>(
              <div key={i} className="highlight-item concern-item"><i className="fa fa-exclamation-triangle"/>  {c}</div>
            ))}
          </div>
        </div>
      )}

      <div className="detail-section">
        <h4>Cover Letter <span style={{color:'var(--muted)',fontSize:11,textTransform:'none'}}>(edit before sending)</span></h4>
        <textarea value={letter} onChange={e=>setLetter(e.target.value)} style={{minHeight:220,lineHeight:1.7}}
          placeholder="Cover letter will appear here..."/>
        <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={saveLetter} disabled={saving}>
          <i className="fa fa-save"/>Save edits
        </button>
      </div>

      {job.description && (
        <div className="detail-section">
          <h4>Job Description</h4>
          <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.7,maxHeight:180,overflowY:'auto',background:'var(--surface2)',padding:12,borderRadius:8}}>
            {job.description}
          </div>
        </div>
      )}

      <div className="action-bar">
        {job.status !== 'approved' && job.status !== 'submitted' && (
          <button className="btn btn-success" onClick={()=>update('approved')} disabled={saving}>
            <i className="fa fa-check"/>Approve
          </button>
        )}
        {job.status === 'approved' && (() => {
          const u = (job.url||'').toLowerCase();
          const isForm = u.includes('linkedin.com') || u.includes('greenhouse.io') || u.includes('workday') || u.includes('lever.co');
          const isIndeed = u.includes('indeed.com');
          if (isForm) {
            return (
              <div style={{fontSize:13,color:'var(--blue)',display:'flex',alignItems:'center',gap:8,background:'var(--surface2)',padding:'10px 14px',borderRadius:8}}>
                <i className="fa fa-laptop-code"/>
                This job needs a form. Run <code style={{background:'var(--surface3)',padding:'2px 6px',borderRadius:4}}>local_form_filler.py</code> on your Mac to auto-fill it.
              </div>
            );
          }
          if (isIndeed) {
            return (
              <div style={{fontSize:13,color:'var(--yellow)',display:'flex',alignItems:'center',gap:8,background:'var(--surface2)',padding:'10px 14px',borderRadius:8}}>
                <i className="fa fa-hand-pointer"/>
                Indeed applications vary — please apply manually using the cover letter above.
              </div>
            );
          }
          return (
            <button className="btn btn-purple" onClick={()=>setShowEmail(true)}>
              <i className="fa fa-envelope"/>Send Email Application
            </button>
          );
        })()}
        {job.status === 'submitted' && (
          <span style={{fontSize:13,color:'var(--purple)',display:'flex',alignItems:'center',gap:6}}>
            <i className="fa fa-check-circle"/>Application submitted
          </span>
        )}
        {job.status !== 'rejected' && (
          <button className="btn btn-danger" onClick={()=>update('rejected')} disabled={saving}>
            <i className="fa fa-times"/>Reject
          </button>
        )}
        {job.status === 'rejected' && (
          <button className="btn btn-ghost" onClick={()=>update('pending')} disabled={saving}>
            <i className="fa fa-undo"/>Restore
          </button>
        )}
      </div>
    </div>
  );
}

// ── Jobs Page ──────────────────────────────────────────────────────────────────
function JobsPage({ toast }) {
  const [jobs, setJobs]         = useState([]);
  const [selected, setSelected] = useState(null);
  const [filter, setFilter]     = useState('all');
  const [search, setSearch]     = useState('');
  const [loading, setLoading]   = useState(false);
  const [searching, setSearching] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    const r = await fetch(`${API}/jobs`).catch(()=>null);
    if (r) { const d = await r.json(); setJobs(d); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    const interval = setInterval(async () => {
      const r = await fetch(`${API}/search/status`).catch(()=>null);
      if (r) {
        const d = await r.json();
        if (searching && !d.running) { load(); toast('Search complete! New jobs loaded.', 'success'); }
        setSearching(d.running);
      }
    }, 3000);
    return () => clearInterval(interval);
  }, [searching]);

  const triggerSearch = async () => {
    setSearching(true);
    await fetch(`${API}/search`, { method: 'POST' });
    toast('Searching across Indeed, StepStone, LinkedIn & Xing...', 'success');
  };

  const filtered = jobs.filter(j => {
    const matchFilter = filter === 'all' || j.status === filter;
    const matchSearch = !search ||
      j.title.toLowerCase().includes(search.toLowerCase()) ||
      j.company.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const counts = {
    all:       jobs.length,
    pending:   jobs.filter(j=>j.status==='pending').length,
    approved:  jobs.filter(j=>j.status==='approved').length,
    submitted: jobs.filter(j=>j.status==='submitted').length,
    rejected:  jobs.filter(j=>j.status==='rejected').length,
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Job Applications</div>
          <div className="page-subtitle">AI-matched jobs from your selected countries — last 24 hours only</div>
        </div>
        <button className="btn btn-primary" onClick={triggerSearch} disabled={searching}>
          {searching
            ? <><span className="pulse"/> Searching all platforms...</>
            : <><i className="fa fa-search"/>Search Now</>}
        </button>
      </div>

      <div className="filters">
        {Object.entries(counts).map(([k,v]) => (
          <button key={k} className={`filter-btn ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>
            {k.charAt(0).toUpperCase()+k.slice(1)} ({v})
          </button>
        ))}
        <input className="search-input" placeholder="Search title or company..."
          value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {loading ? (
        <div className="empty-state"><i className="fa fa-spinner fa-spin"/>Loading jobs...</div>
      ) : filtered.length === 0 ? (
        <div className="empty-state">
          <i className="fa fa-briefcase"/>
          <div>No jobs found. Click <b>Search Now</b> to find new opportunities.</div>
        </div>
      ) : (
        <div className="jobs-grid">
          {filtered.map(job => (
            <div key={job.id}
              className={`job-card ${selected?.id===job.id?'selected':''}`}
              onClick={()=>setSelected(selected?.id===job.id?null:job)}>
              <ScoreCircle score={job.match_score}/>
              <div>
                <div className="job-title">{job.title}</div>
                <div className="job-meta">
                  <span><i className="fa fa-building"/>{job.company}</span>
                  <span><i className="fa fa-map-marker-alt"/>{job.location}</span>
                  <span><i className="fa fa-calendar"/>{job.posted_date || 'Recently posted'}</span>
                  {job.salary && <span><i className="fa fa-euro-sign"/>{job.salary}</span>}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <StatusBadge status={job.status}/>
                  <span className="badge badge-source">{job.source}</span>
                  <ApplicationTypeBadge url={job.url}/>
                </div>
              </div>
              <div className="job-actions" onClick={e=>e.stopPropagation()}>
                {job.status === 'pending' && <>
                  <button className="btn btn-success btn-sm" onClick={async()=>{
                    await fetch(`${API}/jobs/${job.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'approved'})});
                    load(); toast('Approved!','success');
                  }}><i className="fa fa-check"/>Approve</button>
                  <button className="btn btn-danger btn-sm" onClick={async()=>{
                    await fetch(`${API}/jobs/${job.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'rejected'})});
                    load(); toast('Rejected','error');
                  }}><i className="fa fa-times"/>Reject</button>
                </>}
                {job.status === 'approved' && (
                  <button className="btn btn-purple btn-sm" onClick={()=>setSelected(job)}>
                    <i className="fa fa-envelope"/>Send Email
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {selected && (
        <JobDetail job={selected} onClose={()=>setSelected(null)}
          onUpdate={()=>{ load(); setSelected(null); }} toast={toast}/>
      )}
    </div>
  );
}

// ── Stats Page ─────────────────────────────────────────────────────────────────
function StatsPage() {
  const [stats, setStats] = useState({});
  useEffect(()=>{
    fetch(`${API}/stats`).then(r=>r.json()).then(setStats).catch(()=>{});
  },[]);
  const cards = [
    {label:'Total Found',   value:stats.total||0,     color:'var(--blue)',   icon:'fa-database'},
    {label:'Pending Review',value:stats.pending||0,   color:'var(--yellow)', icon:'fa-clock'},
    {label:'Approved',      value:stats.approved||0,  color:'var(--green)',  icon:'fa-check-circle'},
    {label:'Submitted',     value:stats.submitted||0, color:'var(--purple)', icon:'fa-paper-plane'},
    {label:'Rejected',      value:stats.rejected||0,  color:'var(--red)',    icon:'fa-times-circle'},
  ];
  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">Dashboard</div><div className="page-subtitle">Your application overview</div></div>
      </div>
      <div className="stats-grid">
        {cards.map((c,i)=>(
          <div key={i} className="stat-card">
            <div style={{color:c.color,fontSize:13,marginBottom:8}}><i className={`fa ${c.icon}`}/> {c.label}</div>
            <div className="stat-value" style={{color:c.color}}>{c.value}</div>
          </div>
        ))}
      </div>
      <div className="stat-card" style={{marginTop:12}}>
        <div style={{color:'var(--muted)',fontSize:13,marginBottom:6}}>Average Match Score</div>
        <div style={{fontSize:32,fontWeight:700,color:'var(--yellow)'}}>
          {stats.avg_score||0}<span style={{fontSize:16,color:'var(--muted)'}}>/100</span>
        </div>
      </div>

      <div className="stat-card" style={{marginTop:12}}>
        <div style={{color:'var(--muted)',fontSize:13,marginBottom:14}}>Applications by Type</div>
        {(() => {
          const t = stats.application_types || {};
          const rows = [
            {label:'LinkedIn (Easy Apply / Apply)', value:t.linkedin_easy_apply||0, icon:'fa-window-restore', color:'var(--blue)', note:'run local_form_filler.py'},
            {label:'Greenhouse',                    value:t.greenhouse||0,          icon:'fa-window-restore', color:'var(--blue)', note:'run local_form_filler.py'},
            {label:'Workday',                       value:t.workday||0,             icon:'fa-window-restore', color:'var(--blue)', note:'run local_form_filler.py'},
            {label:'Lever',                         value:t.lever||0,               icon:'fa-window-restore', color:'var(--blue)', note:'run local_form_filler.py'},
            {label:'Email apply',                   value:t.email||0,               icon:'fa-envelope',       color:'var(--purple)', note:'Send Email Application button'},
            {label:'Indeed (manual)',                value:t.indeed_manual||0,       icon:'fa-hand-pointer',   color:'var(--yellow)', note:'apply manually'},
          ];
          return (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {rows.map((r,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:i<rows.length-1?'1px solid var(--border)':'none'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <i className={`fa ${r.icon}`} style={{color:r.color,width:16}}/>
                    <span style={{fontSize:13}}>{r.label}</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>— {r.note}</span>
                  </div>
                  <span style={{fontSize:16,fontWeight:700,color:r.color}}>{r.value}</span>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ── Settings Page ──────────────────────────────────────────────────────────────
function SettingsPage({ toast }) {
  const [s, setS]       = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    fetch(`${API}/settings`).then(r=>r.json()).then(setS).catch(()=>{});
  },[]);

  const save = async (key, value) => {
    setSaving(true);
    await fetch(`${API}/settings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,value})});
    setSaving(false);
    toast('Saved!','success');
  };

  const Field = ({label, k, type='text', placeholder=''}) => (
    <div className="field">
      <label>{label}</label>
      <input type={type} value={s[k]||''} placeholder={placeholder}
        onChange={e=>setS({...s,[k]:e.target.value})}
        onBlur={()=>save(k, s[k]||'')}/>
    </div>
  );

  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">Settings</div><div className="page-subtitle">Configure your job search and email preferences</div></div>
      </div>

      <div className="settings-card">
        <h3><i className="fa fa-user" style={{color:'var(--blue)'}}/>Profile</h3>
        <div className="settings-grid">
          <Field label="Full Name" k="applicant_name"/>
          <Field label="Email" k="applicant_email" type="email"/>
          <Field label="Phone" k="applicant_phone"/>
          <Field label="Salary Expectation (€)" k="salary_expectation"/>
          <Field label="Availability" k="availability"/>
        </div>
      </div>

      <div className="settings-card">
        <h3><i className="fa fa-search" style={{color:'var(--green)'}}/>Search Preferences</h3>
        <div className="settings-grid">
          <div className="field">
            <label>Job Titles (comma separated)</label>
            <input value={s.job_titles||''} onChange={e=>setS({...s,job_titles:e.target.value})}
              onBlur={()=>save('job_titles',s.job_titles||'')}/>
          </div>
          <div className="field">
            <label>Minimum Match Score (0–100)</label>
            <input type="number" min="0" max="100" value={s.min_score||60}
              onChange={e=>setS({...s,min_score:e.target.value})}
              onBlur={()=>save('min_score',s.min_score||'60')}/>
          </div>
        </div>

        <div className="field" style={{marginTop:16}}>
          <label>Countries to search</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:6}}>
            {[
              {key:'germany',     label:'🇩🇪 Germany'},
              {key:'austria',     label:'🇦🇹 Austria'},
              {key:'switzerland', label:'🇨🇭 Switzerland'},
              {key:'norway',      label:'🇳🇴 Norway'},
              {key:'australia',   label:'🇦🇺 Australia'},
            ].map(c => {
              const selected = (s.countries||'germany').split(',').map(x=>x.trim()).includes(c.key);
              return (
                <button
                  key={c.key}
                  type="button"
                  className="filter-btn"
                  style={selected ? {background:'var(--green)22',color:'var(--green)',borderColor:'var(--green)55'} : {}}
                  onClick={() => {
                    const current = (s.countries||'germany').split(',').map(x=>x.trim()).filter(Boolean);
                    let updated;
                    if (current.includes(c.key)) {
                      updated = current.filter(x => x !== c.key);
                      if (updated.length === 0) updated = ['germany']; // always keep at least one
                    } else {
                      updated = [...current, c.key];
                    }
                    const value = updated.join(',');
                    setS({...s, countries: value});
                    save('countries', value);
                  }}
                >
                  {selected && <i className="fa fa-check" style={{marginRight:4}}/>}
                  {c.label}
                </button>
              );
            })}
          </div>
          <p style={{fontSize:11,color:'var(--muted)',marginTop:8,lineHeight:1.5}}>
            <i className="fa fa-info-circle"/> StepStone & Xing only cover Germany, Austria, and Switzerland.
            Indeed and LinkedIn search all 5 countries.
          </p>
        </div>
      </div>

      <div className="settings-card">
        <h3><i className="fa fa-envelope" style={{color:'var(--purple)'}}/>Email Setup (Gmail)</h3>
        <div className="smtp-warning" style={{marginBottom:16}}>
          <i className="fa fa-info-circle"/> To enable auto email sending, you need a Gmail App Password.
          Go to <b>myaccount.google.com → Security → 2-Step Verification → App Passwords</b> and generate one.
          Use that password below — NOT your regular Gmail password.
        </div>
        <div className="settings-grid">
          <Field label="Gmail Address" k="smtp_user" type="email" placeholder="stanleychukwu001@gmail.com"/>
          <Field label="Gmail App Password" k="smtp_pass" type="password" placeholder="xxxx xxxx xxxx xxxx"/>
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage]       = useState('dashboard');
  const [toastMsg, setToastMsg] = useState(null);
  const toast = (msg, type='success') => setToastMsg({msg, type});

  const nav = [
    { id:'dashboard', label:'Dashboard', icon:'fa-chart-bar' },
    { id:'jobs',      label:'Jobs',      icon:'fa-briefcase' },
    { id:'settings',  label:'Settings',  icon:'fa-cog' },
  ];

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo"><i className="fa fa-robot"/>Job Agent</div>
        {nav.map(n => (
          <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <i className={`fa ${n.icon}`}/>{n.label}
          </button>
        ))}
        <div style={{marginTop:'auto',padding:'12px',fontSize:11,color:'var(--muted)'}}>
          <div>Stanley Chukwuma Okoro</div>
          <div>Data Scientist · Germany</div>
        </div>
      </div>
      <div className="main">
        {page === 'dashboard' && <StatsPage/>}
        {page === 'jobs'      && <JobsPage toast={toast}/>}
        {page === 'settings'  && <SettingsPage toast={toast}/>}
      </div>
      {toastMsg && <Toast {...toastMsg} onClose={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
